<!DOCTYPE html>
<html>
<head>
    <title>Gesture AI System</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        h1 {
            color: #38bdf8;
            margin-top: 15px;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
        }

        video {
            border-radius: 15px;
            border: 3px solid #38bdf8;
        }

        .panel {
            width: 380px;
            background: #1e293b;
            padding: 20px;
            border-radius: 15px;
            text-align: left;
        }

        .gesture {
            font-size: 26px;
            color: #22c55e;
            margin-bottom: 10px;
        }

        .confidence {
            margin-bottom: 20px;
        }

        .bar {
            margin-bottom: 10px;
        }

        .label {
            font-size: 13px;
        }

        .bg {
            background: #334155;
            height: 8px;
            border-radius: 5px;
        }

        .fill {
            height: 8px;
            background: #38bdf8;
            width: 0%;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<h1>🤖 Gesture Recognition AI</h1>

<div class="container">

    <div>
        <video id="video" width="500" autoplay></video>
        <canvas id="canvas" style="display:none;"></canvas>
    </div>

    <div class="panel">
        <div class="gesture" id="gesture">Waiting...</div>
        <div class="confidence" id="confidence">--</div>

        <div id="bars"></div>
    </div>

</div>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const gesture = document.getElementById("gesture");
const confidence = document.getElementById("confidence");
const bars = document.getElementById("bars");

// NEW analytics div
const analyticsDiv = document.createElement("div");
analyticsDiv.style.marginTop = "20px";
document.querySelector(".panel").appendChild(analyticsDiv);

// CAMERA
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
    video.srcObject = stream;
});

let busy = false;

// =========================
// PREDICTION LOOP
// =========================
setInterval(() => {

    if (busy) return;
    if (video.videoWidth === 0) return;

    busy = true;

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video, 0, 0);

    canvas.toBlob((blob) => {

        if (!blob) {
            busy = false;
            return;
        }

        const formData = new FormData();
        formData.append("image", blob, "frame.jpg");

        fetch("/predict", {
            method: "POST",
            body: formData
        })
        .then(res => res.json())
        .then(data => {

            gesture.innerText = "Gesture: " + data.gesture;
            confidence.innerText = "Confidence: " + data.confidence.toFixed(2) + "%";

            bars.innerHTML = "";

            for (let key in data.probabilities) {
                let val = data.probabilities[key];

                let div = document.createElement("div");
                div.className = "bar";

                div.innerHTML = `
                    <div class="label">${key} - ${val.toFixed(2)}%</div>
                    <div class="bg">
                        <div class="fill" style="width:${val}%"></div>
                    </div>
                `;

                bars.appendChild(div);
            }

        })
        .finally(() => busy = false);

    }, "image/jpeg");

}, 1000);


// =========================
// ANALYTICS LOOP (SPARK)
// =========================
setInterval(() => {

    fetch("/analytics")
    .then(res => res.json())
    .then(data => {

        analyticsDiv.innerHTML = "<h3>📊 Live Analytics (Spark)</h3>";

        let counts = {};

        data.forEach(item => {
            counts[item.gesture] = item.count;
        });

        for (let key in counts) {

            let val = counts[key];

            let p = document.createElement("p");
            p.innerText = `${key} → ${val}`;

            // 🚨 SOS ALERT
            if (key === "SOS" && val > 0) {
                p.style.color = "red";
                p.innerText += " 🚨 ALERT!";
            }

            analyticsDiv.appendChild(p);
        }

    });

}, 2000);
</script>

</body>
</html>
